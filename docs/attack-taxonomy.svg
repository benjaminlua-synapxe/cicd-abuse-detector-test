  <text x="332" y="358" font-size="7.5" fill="#3b82f6">actions_id_token_url</text>

  <rect x="332" y="376" width="116" height="20" rx="10" fill="#431407" stroke="#ea580c" stroke-width="1"/>
  <text x="390" y="390" text-anchor="middle" font-size="8" font-weight="700" fill="#fdba74">suspicious / high</text>

  <text x="390" y="420" text-anchor="middle" font-size="7" font-style="italic" fill="#94a3b8">Common pattern</text>

