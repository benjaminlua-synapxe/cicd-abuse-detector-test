<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 560" font-family="system-ui, -apple-system, sans-serif" font-size="12">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
