  <line x1="78" y1="230" x2="78" y2="258" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="234" y1="230" x2="234" y2="258" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="390" y1="230" x2="390" y2="258" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="544" y1="230" x2="544" y2="258" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="700" y1="230" x2="700" y2="258" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="856" y1="230" x2="856" y2="258" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="1010" y1="230" x2="1010" y2="258" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="1166" y1="230" x2="1166" y2="258" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="1322" y1="230" x2="1322" y2="258" stroke="#cbd5e1" stroke-width="1.5"/>

