  <text x="176" y="316" font-size="8" fill="#475569">checkout of PR head SHA</text>

  <text x="176" y="334" font-size="7" font-weight="600" fill="#64748b">SIGNALS</text>
  <text x="176" y="346" font-size="7.5" fill="#3b82f6">pull_request_target</text>
  <text x="176" y="358" font-size="7.5" fill="#3b82f6">checkout_ref, workflow_run</text>

