  <rect x="10" y="260" width="136" height="176" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="10" y="260" width="136" height="26" rx="8" fill="#dc2626"/>
  <rect x="10" y="278" width="136" height="8" fill="#dc2626"/>
  <text x="78" y="278" text-anchor="middle" font-size="8.5" font-weight="700" fill="#fff">SECRET EXFILTRATION</text>

  <text x="20" y="304" font-size="8" fill="#475569">secrets.* piped to curl</text>
  <text x="20" y="316" font-size="8" fill="#475569">POST external endpoint</text>

  <text x="20" y="334" font-size="7" font-weight="600" fill="#64748b">SIGNALS</text>
  <text x="20" y="346" font-size="7.5" fill="#3b82f6">secrets_context, curl_wget</text>
  <text x="20" y="358" font-size="7.5" fill="#3b82f6">cloud_auth_action</text>

  <rect x="20" y="376" width="116" height="20" rx="10" fill="#450a0a" stroke="#dc2626" stroke-width="1"/>
  <text x="78" y="390" text-anchor="middle" font-size="8" font-weight="700" fill="#fca5a5">malicious / critical</text>

  <text x="78" y="420" text-anchor="middle" font-size="7" font-style="italic" fill="#94a3b8">GhostAction (2025)</text>

