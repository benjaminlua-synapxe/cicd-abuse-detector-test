  <text x="576" y="171" font-size="9" fill="#475569">&gt;</text>
  <rect x="584" y="158" width="76" height="18" rx="4" fill="#1e293b" stroke="#475569" stroke-width=".75"/>
  <text x="622" y="171" text-anchor="middle" font-size="8.5" fill="#94a3b8">Per-File Diff</text>
  <text x="666" y="171" font-size="9" fill="#475569">&gt;</text>
  <rect x="674" y="158" width="76" height="18" rx="4" fill="#1e293b" stroke="#3b82f6" stroke-width=".75"/>
  <text x="712" y="171" text-anchor="middle" font-size="8.5" fill="#60a5fa">Prescreen labels</text>
  <text x="756" y="171" font-size="9" fill="#475569">&gt;</text>
  <rect x="764" y="158" width="76" height="18" rx="4" fill="#1e293b" stroke="#475569" stroke-width=".75"/>
  <text x="802" y="171" text-anchor="middle" font-size="8.5" fill="#94a3b8">Enrichment</text>
  <text x="846" y="171" font-size="9" fill="#475569">&gt;</text>
  <rect x="854" y="158" width="76" height="18" rx="4" fill="#1e293b" stroke="#6366f1" stroke-width="1"/>
  <text x="892" y="171" text-anchor="middle" font-size="8.5" font-weight="600" fill="#a5b4fc">Copilot AI</text>

