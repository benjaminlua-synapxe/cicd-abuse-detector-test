# CI: validate templates; emit dependency manifest for open-source compliance.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf333 # v4

      - uses: actions/setup-python@42375524f6c52773e6b5140f95676b79973e3544 # v5
        with:
          python-version: "3.12"

      - name: Install validation dependency
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: make validate
        run: make validate

      - name: make test
        run: make test

      - name: dependency manifest
        run: pip freeze > dependencies.txt

      - name: Upload dependency manifest
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4
        with:
          name: dependency-manifest
          path: dependencies.txt